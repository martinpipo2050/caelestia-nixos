name: Bug report
description: Report a reproducible problem with Caelestia-NixOS.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.

        Before submitting, please make sure you are using the latest supported version of Caelestia-NixOS.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the problem.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe how to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: nixos
    attributes:
      label: NixOS version
      placeholder: "25.05"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: "ThinkPad T480, AMD Ryzen 7..."

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: Add any other context that may help.
